version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - WEBHOOK_VERIFY_TOKEN=${WEBHOOK_VERIFY_TOKEN}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    depends_on:
      - redis
    networks:
      - autostream-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - autostream-network

volumes:
  redis_data:

networks:
  autostream-network:
    driver: bridge